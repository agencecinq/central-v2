databases:
  - name: cinq-central-db
    region: frankfurt
    plan: basic-256mb
    diskSizeGB: 1
    databaseName: cinq_central
    user: cinq

services:
  - type: web
    name: cinq-central
    runtime: node
    region: frankfurt
    plan: starter
    branch: main
    buildCommand: npm install && rm -rf src/generated/prisma && npx prisma generate && npm run build && cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public
    startCommand: PORT=$PORT node .next/standalone/server.js
    healthCheckPath: /login
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cinq-central-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: QONTO_LOGIN
        sync: false
      - key: QONTO_SECRET_KEY
        sync: false
      - key: AUTH_TRUST_HOST
        value: "true"
